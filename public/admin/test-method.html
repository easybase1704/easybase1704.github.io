<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>this.method in data() 测试</title>
<style>
body { font-size: 14px; background: #f5f6fa; padding: 80px 20px; }
.ok { background: #d4edda; color: #0f5132; border: 2px solid #28a745; padding: 16px; margin: 10px 0; border-radius: 8px; }
.err { background: #f8d7da; color: #842029; border: 2px solid #dc3545; padding: 16px; margin: 10px 0; border-radius: 8px; }
</style>
</head>
<body>
<h2>测试：data() 中调用 this.method()</h2>
<div id="app">
  <div v-if="error" class="err">❌ {{ error }}</div>
  <div v-else class="ok">✅ 主页面模式可行：product.name = {{ editingProduct.name }}，news.title = {{ editingNews.title }}</div>
</div>

<script src="vendor/vue.global.prod.js"></script>
<script>
try {
  const { createApp } = Vue;

  const app = createApp({
    data() {
      // 和主页面完全一样的模式
      const p = this._emptyProduct();
      const n = this._emptyNews();
      return {
        error: null,
        editingProduct: p,
        editingNews: n,
      };
    },
    methods: {
      _emptyProduct() {
        return { oid: null, name: '', classId: 9, duibi: '', cpu: '', neicun: '', ssd: '', jiekou: '', isHot: false, yiwaibao: '', lifekit: '', duibiEn: '', yiwaibaoEn: '', lifekitEn: '', slug: '' };
      },
      _emptyNews() {
        return { oid: null, title: '', classId: 1, description: '', date: new Date().toISOString().slice(0,10), hits: 0, img: '', isHot: false, body: '', titleEn: '', descriptionEn: '', bodyEn: '' };
      },
    }
  });

  app.mount('#app');
  document.write('<div class="ok">✅ Vue 挂载完成 — this.method() in data() 可行</div>');

} catch(e) {
  document.write('<div class="err">❌ 挂载失败: ' + e.message + '</div>');
}
</script>
</body>
</html>
